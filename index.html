<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>豆包 TTS 声音库</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --text: #e8eaf6;
    --text-muted: #7b83b0;
    --male: #4fc3f7;
    --female: #f48fb1;
    --young: #81c784;
    --mature: #ffb74d;
    --radius: 12px;
    --card-w: 200px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #1a1d27 0%, #12142a 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
  }

  .logo {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .count-badge {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .count-badge span { color: var(--accent); font-weight: 600; }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }

  .search-wrap {
    flex: 1;
    min-width: 180px;
    max-width: 320px;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }

  input[type="search"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px 8px 36px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="search"]::placeholder { color: var(--text-muted); }
  input[type="search"]:focus { border-color: var(--accent); }

  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    padding-right: 4px;
  }

  .chip {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.18s;
    user-select: none;
    white-space: nowrap;
  }

  .chip:hover { border-color: var(--accent); color: var(--text); }

  .chip.active-all   { background: var(--accent); border-color: var(--accent); color: #fff; }
  .chip.active-male  { background: var(--male);   border-color: var(--male);   color: #000; }
  .chip.active-female{ background: var(--female); border-color: var(--female); color: #000; }
  .chip.active-young { background: var(--young);  border-color: var(--young);  color: #000; }
  .chip.active-mature{ background: var(--mature); border-color: var(--mature); color: #000; }

  main {
    padding: 28px 32px;
  }

  .empty {
    text-align: center;
    color: var(--text-muted);
    padding: 80px 0;
    font-size: 15px;
    display: none;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(var(--card-w), 1fr));
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    cursor: default;
  }

  .card:hover {
    border-color: #4a4f7a;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .card.playing {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 8px 24px rgba(108,99,255,0.25);
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }

  .voice-name {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.35;
    flex: 1;
    word-break: break-all;
  }

  .gender-icon {
    font-size: 18px;
    flex-shrink: 0;
    line-height: 1;
    margin-top: 1px;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  .tag-male   { background: rgba(79,195,247,0.15); color: var(--male); border: 1px solid rgba(79,195,247,0.3); }
  .tag-female { background: rgba(244,143,177,0.15); color: var(--female); border: 1px solid rgba(244,143,177,0.3); }
  .tag-young  { background: rgba(129,199,132,0.15); color: var(--young); border: 1px solid rgba(129,199,132,0.3); }
  .tag-mature { background: rgba(255,183,77,0.15);  color: var(--mature); border: 1px solid rgba(255,183,77,0.3); }

  .voice-type-row {
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
  }

  .voice-type {
    font-size: 11px;
    color: var(--text-muted);
    font-family: "SF Mono", "Fira Code", monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }

  .copy-btn {
    flex-shrink: 0;
    background: none;
    border: none;
    padding: 2px 4px;
    cursor: pointer;
    color: var(--text-muted);
    border-radius: 4px;
    line-height: 1;
    transition: color 0.15s, background 0.15s;
  }

  .copy-btn:hover { color: var(--text); background: var(--surface2); }
  .copy-btn.copied { color: var(--young); }

  .play-btn {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px;
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    transition: all 0.18s;
    font-family: inherit;
  }

  .play-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .play-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .play-btn svg { flex-shrink: 0; }

  /* Waveform animation */
  .wave {
    display: none;
    align-items: flex-end;
    gap: 2px;
    height: 14px;
  }
  .wave.show { display: flex; }
  .wave span {
    display: block;
    width: 3px;
    background: currentColor;
    border-radius: 2px;
    animation: wavebar 0.8s ease-in-out infinite;
  }
  .wave span:nth-child(1) { animation-delay: 0s;    height: 4px; }
  .wave span:nth-child(2) { animation-delay: 0.1s;  height: 8px; }
  .wave span:nth-child(3) { animation-delay: 0.2s;  height: 12px; }
  .wave span:nth-child(4) { animation-delay: 0.3s;  height: 6px; }
  .wave span:nth-child(5) { animation-delay: 0.15s; height: 10px; }

  @keyframes wavebar {
    0%, 100% { transform: scaleY(0.4); }
    50%       { transform: scaleY(1); }
  }

  @media (max-width: 600px) {
    header { padding: 16px; }
    main { padding: 16px; }
    .header-top { flex-wrap: wrap; }
  }
</style>
</head>

      <button class="chip" data-filter="age" data-value="mature">成熟</button>

  </div>
</header>

<main>

</main>

  "儒雅","广告","温柔","心灵","大壹","解说","鸡汤女","TVB","感冒","东方","谄媚",
  "女雷神","亲切","刘飞","庄周","武则天","四郎","唐僧","猪八戒","猴哥","擎苍","云舟",
  "Morgan","Alvin","Tina","懒音","悠悠","文静","流畅","暖阳","贴心","珊珊","顾姐","苏菲"
];

function classifyGender(voiceType) {
  if (voiceType.includes("_female_")) return "female";
  if (voiceType.includes("_male_")) return "male";
  return "unknown";
}

function classifyAge(name) {
  for (const kw of YOUNG_KEYWORDS) {
    if (name.includes(kw)) return "young";
  }
  for (const kw of MATURE_KEYWORDS) {
    if (name.includes(kw)) return "mature";
  }
  return "young"; // default
}

function getFilename(name, voiceType) {
  return `./voice-samples/${name}_${voiceType}.mp3`;
}

// Enrich data
const data = VOICES.map(v => ({
  ...v,
  gender: classifyGender(v.voiceType),
  age: classifyAge(v.name),
  file: getFilename(v.name, v.voiceType),
}));

// State
let filterGender = "all";
let filterAge = "all";
let searchText = "";
let playingVoiceType = null;
let cardMap = {}; // voiceType -> card element

const grid = document.getElementById("grid");
const audio = document.getElementById("global-audio");
const shownCount = document.getElementById("shown-count");
const totalCount = document.getElementById("total-count");
const emptyMsg = document.getElementById("empty-msg");

totalCount.textContent = data.length;

function makeCard(v) {
  const card = document.createElement("div");
  card.className = "card";
  card.dataset.voiceType = v.voiceType;

  const genderIcon = v.gender === "female" ? "♀" : "♂";
  const genderClass = v.gender === "female" ? "tag-female" : "tag-male";
  const genderLabel = v.gender === "female" ? "女生" : "男生";
  const ageClass = v.age === "young" ? "tag-young" : "tag-mature";
  const ageLabel = v.age === "young" ? "年轻" : "成熟";

  card.innerHTML = `
    <div class="card-top">
      <div class="voice-name">${v.name}</div>
      <div class="gender-icon" style="color:${v.gender === 'female' ? 'var(--female)' : 'var(--male)'}">${genderIcon}</div>
    </div>
    <div class="tags">
      <span class="tag ${genderClass}">${genderLabel}</span>
      <span class="tag ${ageClass}">${ageLabel}</span>
    </div>
    <div class="voice-type-row">
      <div class="voice-type" title="${v.voiceType}">${v.voiceType}</div>
      <button class="copy-btn" data-copy="${v.voiceType}" title="复制">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </button>
    </div>
    <button class="play-btn" data-voice-type="${v.voiceType}">
      <svg class="play-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
      <div class="wave"><span></span><span></span><span></span><span></span><span></span></div>
      <span class="btn-label">播放</span>
    </button>
  `;

  const btn = card.querySelector(".play-btn");
  btn.addEventListener("click", () => playVoice(v, card, btn));
  cardMap[v.voiceType] = { card, btn };
  return card;
}

function playVoice(v, card, btn) {
  if (playingVoiceType === v.voiceType) {
    if (audio.paused) {
      audio.play();
    } else {
      audio.pause();
      setCardStopped(v.voiceType);
      return;
    }
  } else {
    if (playingVoiceType) setCardStopped(playingVoiceType);
    playingVoiceType = v.voiceType;
    audio.src = v.file;
    audio.play().catch(() => {});
  }
  setCardPlaying(v.voiceType);
}

function setCardPlaying(vt) {
  const el = cardMap[vt];
  if (!el) return;
  el.card.classList.add("playing");
  el.btn.classList.add("active");
  el.btn.querySelector(".play-icon").style.display = "none";
  el.btn.querySelector(".wave").classList.add("show");
  el.btn.querySelector(".btn-label").textContent = "停止";
}

function setCardStopped(vt) {
  const el = cardMap[vt];
  if (!el) return;
  el.card.classList.remove("playing");
  el.btn.classList.remove("active");
  el.btn.querySelector(".play-icon").style.display = "";
  el.btn.querySelector(".wave").classList.remove("show");
  el.btn.querySelector(".btn-label").textContent = "播放";
}

audio.addEventListener("ended", () => {
  if (playingVoiceType) setCardStopped(playingVoiceType);
  playingVoiceType = null;
});

function render() {
  const q = searchText.trim().toLowerCase();
  grid.innerHTML = "";
  cardMap = {};

  const filtered = data.filter(v => {
    if (filterGender !== "all" && v.gender !== filterGender) return false;
    if (filterAge !== "all" && v.age !== filterAge) return false;
    if (q && !v.name.toLowerCase().includes(q) && !v.voiceType.toLowerCase().includes(q)) return false;
    return true;
  });

  shownCount.textContent = filtered.length;
  emptyMsg.style.display = filtered.length === 0 ? "block" : "none";

  filtered.forEach(v => grid.appendChild(makeCard(v)));

  // Restore playing state if card visible
  if (playingVoiceType && cardMap[playingVoiceType] && !audio.paused) {
    setCardPlaying(playingVoiceType);
  }
}

// Chip filter logic
document.querySelectorAll(".chip").forEach(chip => {
  chip.addEventListener("click", () => {
    const filter = chip.dataset.filter;
    const value = chip.dataset.value;

    document.querySelectorAll(`.chip[data-filter="${filter}"]`).forEach(c => {
      c.className = "chip";
    });

    if (filter === "gender") {
      filterGender = value;
      chip.classList.add(value === "all" ? "active-all" : value === "male" ? "active-male" : "active-female");
    } else {
      filterAge = value;
      chip.classList.add(value === "all" ? "active-all" : value === "young" ? "active-young" : "active-mature");
    }

    render();
  });
});

document.getElementById("search").addEventListener("input", e => {
  searchText = e.target.value;
  render();
});

render();

grid.addEventListener("click", e => {
  const btn = e.target.closest(".copy-btn");
  if (!btn) return;
  const text = btn.dataset.copy;
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add("copied");
    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
    setTimeout(() => {
      btn.classList.remove("copied");
      btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
    }, 1500);
  });
});
</script>
</body>
</html>
